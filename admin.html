<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Manifest PRO</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .admin-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
    }
    .admin-table-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .btn-approve {
      background: var(--accent-green);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-right: 5px;
    }
    .btn-reject {
      background: var(--accent-red);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-back {
      background: var(--bg-card-hover);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-back:hover {
      background: var(--border-color);
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <div class="admin-container">
    <div class="admin-header">
      <div class="admin-title">👨‍💻 Developer Panel - User Approval</div>
      <div>
        <a href="index.html" class="btn-back">⬅ Kembali ke Dashboard</a>
      </div>
    </div>

    <div class="admin-table-card">
      <table style="width: 100%;">
        <thead>
          <tr>
            <th style="text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color);">Nama</th>
            <th style="text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color);">Username</th>
            <th style="text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color);">Status</th>
            <th style="text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color);">Aksi</th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
